<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SIGAA · Biblioteca</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link rel="stylesheet" href="custom.css">
</head>
<body>

  <header>
    <nav class="navbar navbar-expand-lg navbar-dark navbar-sigaa sticky-top">
      <div class="container">
        <a class="navbar-brand fw-bold" href="index.html"><i class="fas fa-university me-2"></i>SIGAA</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navMenu">
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navMenu">
          <ul class="navbar-nav ms-auto mb-2 mb-lg-0">
            <li class="nav-item"><a class="nav-link active" href="biblioteca.html">Biblioteca</a></li>
            <li class="nav-item"><a class="nav-link" href="processos-seletivos.html">Processos Seletivos</a></li>
            <li class="nav-item"><a class="nav-link" href="servicos.html">Serviços</a></li>
          </ul>
          <button class="btn btn-light rounded-pill text-sigaa fw-semibold ms-lg-3" type="button" data-action="login">
            <i class="fas fa-user me-1"></i>Login
          </button>
        </div>
      </div>
    </nav>
  </header>

  <main class="container my-5">
    <a href="index.html" class="btn btn-light mb-4"><i class="fas fa-arrow-left me-2"></i>Voltar ao início</a>

    <div class="row g-5">
      <div class="col-lg-6">
        <div class="foto-wrapper ratio-lib rounded-4 mb-3">
          <img src="biblioteca central.png" alt="Biblioteca Central da UFPB">
        </div>
        <div class="row g-3">
          <div class="col-6">
            <div class="foto-wrapper ratio-lib rounded-4">
              <img src="biblioteca setorial do cchla.png" alt="Biblioteca Setorial do CCHLA">
            </div>
          </div>
          <div class="col-6">
            <div class="foto-wrapper ratio-lib rounded-4">
              <img src="bibiloteca setorial do ccen.png" alt="Biblioteca Setorial do CCEN">
            </div>
          </div>
        </div>
        <a href="#" class="d-inline-block mt-3 text-sigaa fw-semibold" data-action="outras-bibliotecas">
          + outras bibliotecas
        </a>
      </div>

      <div class="col-lg-6">
        <div class="btn-group w-100 mb-4" role="group" aria-label="Filtro do acervo">
          <a href="livros.html?q=livros+de+programação" class="btn btn-outline-primary">Livros</a>
          <a href="artigos.html?q=artigos+científicos" class="btn btn-outline-primary">Artigos</a>
        </div>

        <form class="input-group mb-4" action="resultados.html" method="get">
          <input type="text" class="form-control" name="q" id="searchBiblioteca"
                 placeholder="Pesquise no acervo da biblioteca" value="inteligência artificial">
          <button class="btn btn-primary" type="submit" aria-label="Pesquisar">
            <i class="fas fa-search"></i>
          </button>
        </form>

        <div class="alert alert-light border" role="alert">
          Digite um termo e pesquise para ver os resultados do acervo.
        </div>
      </div>
    </div>
  </main>

  <footer class="bg-sigaa text-white-50 text-center py-4 mt-5">
    <div class="container small">Universidade Federal da Paraíba · SIGAA Portal Público</div>
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="script.js" defer></script>
</body>
</html>
